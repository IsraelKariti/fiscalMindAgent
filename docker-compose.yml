services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fiscalmind
      POSTGRES_PASSWORD: fiscalmind
      POSTGRES_DB: fiscalmind
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - fiscalmind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscalmind -d fiscalmind"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - fiscalmind-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Azure Blob Storage emulator — dev stand-in for the production storage
  # account (client document files). Blob endpoint only.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: unless-stopped
    # --skipApiVersionCheck: the @azure/storage-blob SDK often targets an API
    # version newer than Azurite's supported list; the calls we make are basic.
    command: ["azurite-blob", "--blobHost", "0.0.0.0", "--location", "/data", "--skipApiVersionCheck"]
    ports:
      - "${AZURITE_HOST_PORT:-10000}:10000"
    volumes:
      - fiscalmind-azurite-data:/data

volumes:
  fiscalmind-postgres-data:
  fiscalmind-redis-data:
  fiscalmind-azurite-data:
