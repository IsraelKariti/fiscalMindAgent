services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fiscalmind
      POSTGRES_PASSWORD: fiscalmind
      POSTGRES_DB: fiscalmind
    ports:
      - "5432:5432"
    volumes:
      - fiscalmind-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - fiscalmind-redis-data:/data

volumes:
  fiscalmind-postgres-data:
  fiscalmind-redis-data:
